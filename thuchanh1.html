<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<style>
body{
     font-family: Arial, sans-serif;
    background:#f2f2f2;

}
.container{
    width:800px;
    margin:40px auto;
    background:#fff;
    padding:30px;
    border:2px solid #ccc;
}
form{
    display:flex;
    flex-direction:column;
    gap:15px;
}
.row{
    display:flex;
    gap:20px;
}

.row input{
    flex:1;
}

input, textarea{
    padding:10px;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:14px;
    width:100%;
    box-sizing:border-box;
}

textarea{
    height:150px;
    resize:none;
}

.bottom{
    display:flex;
    justify-content:space-between; 
    align-items:center;
}

button{
    background:#4da6d9;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#3b8db8;
}

.note{
    font-size:13px;
    color:#888;
}
</style>
</head>

<body>

<div class="container">
    <h2>Get in touch with us by filling contact form below</h2>

    <form>
        <div class="row">
            <input type="text" placeholder="* Enter your full name">
            <input type="email" placeholder="* Enter your email address">
        </div>

        <input type="text" placeholder="Enter your subject">

        <textarea placeholder="* Your message here..."></textarea>

        <div class="bottom">
            <button type="submit">Send message</button>
            <span class="note">* Please fill all required form field, thanks!</span>
        </div>
    </form>
</div>

</body>
</html>
